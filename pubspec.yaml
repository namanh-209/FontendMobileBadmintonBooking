name: do_an
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  http_parser: ^4.0.2
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  url_launcher: ^6.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  webview_flutter: ^4.13.1
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo2.png"
  adaptive_icon_background: "#F5F9FF"
  adaptive_icon_foreground: "assets/images/logo2.png"

flutter_native_splash:
  color: "#F5F9FF"
  image: assets/images/logo2.png
  android: true
  ios: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/